services:
  flask-app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: flask-dev
    ports:
      - "5000:5000"
    volumes:
      - ./:/app           # live code sync for local dev
    environment:
      FLASK_APP: run.py
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      MQTT_BROKER: "172.17.0.1"
    command: python run.py